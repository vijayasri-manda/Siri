<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .logo
        {
            width: 35px;
            height:35px;
        }
        .logo:hover
        {
            width: 40px;
            height:40px;
            border:2px solid pink;
            border-radius:10px;
        }
        h2{
            color:antiquewhite;
        }
        
        h2:hover
        {
            color:whitesmoke;
            font-size:30px;
        }
        center
        {
            color:antiquewhite
        }
        marquee
        {
            font-size:30px;
            color:blue;
        }
        .s1
        {
            width:fit-content;
            text-align:left;
        }
    </style>
</head>
<body>
    <center><marquee direction="right" scrollamount="7px" width="150px" behaviour="alternate">Skills</marquee></center>
    <div class="s1">
        <table cellspacing="60px">
            <tr>
        
        <th><img src="c.png" class="logo"></imag>  C</th>
        <th><img src="c++.png" class="logo"></imag>  C++</th>
        </tr>
        <tr>
            <th><img src="Python.svg" class="logo"></imag>  Python</th> 
            <th><img src="javalogo.webp" class="logo"></imag>  Java</th>
        </tr>
        <tr>
        <th> <img src="html.html" class="logo"></imag>  HTML</th>
        <th><img src="css.jpg" class="logo"></imag>  CSS</th>
        </tr>
        </table>
        
    </div>
</body>
</html>
